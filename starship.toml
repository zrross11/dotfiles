# Starship prompt configuration
# https://starship.rs/config/

format = """
[╭─](bold blue)$username@$hostname\
$directory\
$git_branch\
$git_status\
$kubernetes\
$nodejs\
$python\
$cmd_duration\
$line_break\
[╰─](bold blue)$time\
$character"""

# Username configuration
[username]
show_always = true
style_user = "bold yellow"
style_root = "bold red"
format = "[$user]($style)"

# Hostname configuration
[hostname]
ssh_only = false
ssh_symbol = "🌐 "
style = "bold yellow"
format = "[$hostname]($style) "

# Disable the package module, it can be slow
[package]
disabled = true

# Directory configuration
[directory]
truncation_length = 3
truncate_to_repo = true
truncation_symbol = "…/"
style = "bold cyan"
format = "[$path]($style)[$read_only]($read_only_style) "

# Git configuration
[git_branch]
symbol = " "
truncation_length = 20
truncation_symbol = "…"
style = "bold purple"
format = "on [$symbol$branch(:$remote_branch)]($style) "

[git_status]
conflicted = "🏳 "
up_to_date = "✓"
untracked = "🤷"
ahead = "⇡${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
behind = "⇣${count}"
style = "bold red"
format = '([\[$all_status$ahead_behind\]]($style) )'

# Kubernetes configuration
[kubernetes]
format = "on [⛵ $context \\($namespace\\)](bold cyan) "
disabled = false
detect_extensions = ["yaml", "yml"]
detect_files = ["kubeconfig"]
detect_folders = [".kube"]
detect_env_vars = ["KUBECONFIG"]

# Command duration
[cmd_duration]
min_time = 2_000
format = "took [$duration](bold yellow)"

# Time
[time]
disabled = false
format = "at [$time](bold green) "

# Python
[python]
format = "via [🐍 $version](bold blue) "
detect_extensions = ["py"]
detect_files = [".python-version", "Pipfile", "__pycache__", "pyproject.toml", "requirements.txt", "setup.py", "tox.ini"]
detect_folders = []

# Node.js
[nodejs]
format = "via [⬢ $version](bold green) "
detect_extensions = ["js", "mjs", "cjs", "ts", "tsx", "jsx"]
detect_files = ["package.json", ".node-version"]
detect_folders = ["node_modules"]

# Git commit
[git_commit]
commit_hash_length = 7
tag_symbol = "🏷  "
style = "bold green"

# Character (prompt symbol)
[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"

